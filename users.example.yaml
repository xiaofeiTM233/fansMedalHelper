USERS:
  - access_key: XXXXXX # 注意半角冒号后的空格 否则格式会错误
    white_uid: 0 # 白名单 UID, 多个 UID 以半角逗号,分隔，填写后只会打卡这些用户，黑名单失效，不用就填 0
    banned_uid: 0 # 黑名单 UID 多个 UID 以半角逗号,分隔，填写后不会打卡这些用户，不填则不限制，两个都填 0 则不限制
  - access_key:
    white_uid: 0
    banned_uid: 0
  # 注意对齐
  # 多用户以上格式添加
  # 严格要求按照 yaml 格式
  # 半角井号后为注释 半角井号前后必须有空格！半角井号前后必须有空格！半角井号前后必须有空格！
  # 半角冒号后面也要有空格！半角冒号前面也要有空格！半角冒号前面也要有空格！
  # 半角冒号: 半角逗号, 半角井号# 三个符号前后都需要有空格，如不了解可以使用 yaml 格式化工具检查
CRON: # 0 0 * * *
# 这里是 cron 表达式，表达式写法可参考 https://crontab.cronhub.io
# 如需设置多 cron 表达式，可以写为 YAML 数组，也可使用 || 进行分割
# 如果不填，则不使用内置定时器，填写正确后要保持该进程一直运行
STOPWATCHINGTIME: # '00:00:00' 或 86400
# 可用于当单次任务运行总时间大于一定时间（尤指直播），可能影响下次任务时，不填写不生效
# 本设置项前仅对直播有效
# 支持 'HH:mm:ss' 格式 和 秒格式
# 'HH:mm:ss' 格式：从现在起下次到这个时间（即24小时内），注意要加引号（单双不限）
# 秒格式：从现在起到多少秒（如86400为一天）

SENDKEY: # Server 酱微信推送 可选 获取地址：https://sct.ftqq.com/
MOREPUSH: # 更多种类的推送 详细配置见文档

PROXY: # 推送代理地址，如：http://1.2.3.4:5678 支持 http/socks4/socks5 不支持 https 不用代理的不用填
#########以下为自定义配置#########

ASYNC: 0 # 异步执行，默认同步执行，设置为 1 则异步执行

LIKE_CD: 3 # 点赞间隔时间，单位秒，默认 3 秒，设置为 0 则不点赞

DANMAKU_CD: 0 # 弹幕间隔时间，单位秒，默认 6 秒，设置为 0 则不发弹幕打卡，且只能同步打卡，新版本弹幕打卡无作用，不建议开启

WATCHINGLIVE: 25 # 每日每直播间观看时长，单位分钟，默认 25 分钟，设置为 0 则关闭，新版 25 分钟即满

WEARMEDAL: 0 # 弹幕打卡时自动带上当前房间的粉丝牌，默认关闭，设置为 1 则开启，建议使用B站自带的 优先展示当前直播间的粉丝勋章 功能

SIGNINGROUP: 0 # 应援团签到间隔时间，单位秒，默认 2 秒，设置为 0 则不签到

CUSTOMSIGNIN: 2 # 活动签到间隔时间，单位秒，默认 2 秒，设置为 0 则不签到
# 说明：
# 本项目中的异步执行指的是：同时点赞或者分享所有直播间，速度非常快，但缺点就是可能会被B站吞掉亲密度，所以建议粉丝牌较少的用户开启异步执行
# 粉丝牌数大于 30 的用户建议使用同步，会更加稳定。缺点就是速度比较慢，但是可以设置点赞和分享的间隔时间，避免被B站吞掉亲密度
# 多用户之间依然是异步，不受配置影响
